# Render Blueprint — https://render.com/docs/blueprint-spec
# If deploy still fails, set Start Command to `npm start` in the dashboard (see RENDER_DEPLOY.md).
services:
  - type: web
    name: razor-backend
    runtime: node
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run build && npm run db:deploy:render
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Set values in Render Dashboard → Environment (sync: false = not in git)
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
